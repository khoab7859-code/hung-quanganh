<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Anh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:linear-gradient(
        135deg,
        #6dd5fa,
        #4fc3f7,
        #29b6f6,
        #81d4fa
    );
}

/* Quả cầu sáng kiểu iOS */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
}

body::before{
    width:250px;
    height:250px;
    background:rgba(255,255,255,.25);
    top:-50px;
    left:-50px;
}

body::after{
    width:300px;
    height:300px;
    background:rgba(255,255,255,.18);
    bottom:-80px;
    right:-80px;
}

/* Card */
.card{
    position:relative;
    z-index:2;

    width:90%;
    max-width:420px;

    padding:30px;
    border-radius:35px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(40px) saturate(180%);
    -webkit-backdrop-filter:blur(40px) saturate(180%);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
        0 20px 60px rgba(0,0,0,.15),
        inset 0 1px 1px rgba(255,255,255,.25);

    text-align:center;
    color:white;
}

/* Viền sáng */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:20px;
    right:20px;
    height:1px;
    background:rgba(255,255,255,.7);
}

/* Avatar */
.avatar{
    width:95px;
    height:95px;

    border-radius:50%;
    object-fit:cover;
    object-position:center top;

    border:3px solid rgba(255,255,255,.5);

    box-shadow:
        0 0 20px rgba(255,255,255,.3),
        0 10px 25px rgba(0,0,0,.25);

    margin-bottom:15px;
}

h1{
    font-size:22px;
    margin-bottom:10px;
}

.desc{
    opacity:.9;
    margin-bottom:20px;
    font-size:14px;
}

.social{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;

    margin-top:15px;
    padding:16px;

    text-decoration:none;
    color:white;
    font-weight:600;

    border-radius:24px;

    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.2);

    transition:.25s;
}

.social:hover{
    transform:scale(1.03);
}

.social img{
    width:42px;
    height:42px;
}

.credit{
    margin-top:25px;

    display:inline-block;

    padding:8px 18px;

    border-radius:20px;

    background:rgba(255,255,255,.12);

    font-size:12px;
    opacity:.85;
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
    <source src="https://raw.githubusercontent.com/khoab7859-code/Quanganh/main/2AM%20Hoodtrap.mp3" type="audio/mpeg">
</audio>

<div class="card">

    <img
        class="avatar"
        src="./477FBC52-DB53-4029-8259-951CE1506CB3.jpeg"
        alt="Avatar">

    <h1>Quang Anh</h1>

    <div class="desc">
        Tất cả mxh của Quang Anh ở đây 👇
    </div>

    <a class="social"
       href="https://www.instagram.com/_quag4ahn"
       target="_blank">

        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
        <span>Instagram</span>
    </a>

    <div class="credit">
        Created by Quang Anh
    </div>

</div>

<script>
document.addEventListener("click", () => {
    document.getElementById("bgmusic").play();
}, { once:true });
</script>

</body>
</html>
