<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Anh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#00bfff,#1e90ff,#4169e1);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌧️ mưa */
#rain{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

/* card */
.card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:90%;
    max-width:600px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    margin:10px 0;
}

.creator{
    margin-top:20px;
    font-size:14px;
    color:#e6f7ff;
}

/* MXH title */
.mxh-title{
    margin-top:20px;
    font-weight:bold;
}

/* IG button */
.social a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    margin-top:12px;
    padding:16px 32px;
    background:#E1306C;
    color:white;
    text-decoration:none;
    border-radius:40px;
    font-weight:bold;
    font-size:18px;

    transition:0.3s;
}

.social a:hover{
    transform:scale(1.1);
    background:#c82361;
}
</style>
</head>

<body>

<!-- 🌧️ mưa -->
<canvas id="rain"></canvas>

<div class="card">
    <h1>Quang Anh</h1>

    <p>Chào mừng bạn đến với website ✨</p>
    <p>💙 Cảm ơn bạn đã ghé thăm</p>

    <p class="creator">Được tạo bởi Quang Anh</p>

    <!-- 📱 MXH -->
    <p class="mxh-title">Tất cả MXH của Quang Anh ở đây 👇</p>

    <div class="social">
        <a target="_blank"
        href="https://www.instagram.com/_quag4ahn?igsh=MWNoNnZ3ZmhhcHBkdw%3D%3D&utm_source=qr">
            📷 Instagram
        </a>
    </div>
</div>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let drops = [];

for(let i=0;i<130;i++){
    drops.push({
        x: Math.random()*window.innerWidth,
        y: Math.random()*window.innerHeight,
        len: Math.random()*20+10,
        speed: Math.random()*6+2
    });
}

function rain(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="rgba(255,255,255,0.7)";
    ctx.lineWidth=1;

    for(let d of drops){
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x,d.y+d.len);
        ctx.stroke();

        d.y += d.speed;

        if(d.y > canvas.height){
            d.y = -20;
            d.x = Math.random()*window.innerWidth;
        }
    }

    requestAnimationFrame(rain);
}

rain();
</script>

</body>
</html>
