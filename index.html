<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Anh</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  overflow:hidden;

  /* nền iOS gradient động */
  background: linear-gradient(-45deg,#0a84ff,#5ac8fa,#64d2ff,#007aff);
  background-size:400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ánh sáng chạy */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle,rgba(255,255,255,0.15),transparent 60%);
  animation: lightMove 6s linear infinite;
}

@keyframes lightMove{
  0%{transform:translate(-30%,-30%)}
  50%{transform:translate(10%,10%)}
  100%{transform:translate(-30%,-30%)}
}

/* CARD GLASS */
.card{
  position:relative;
  z-index:2;
  width:88%;
  max-width:430px;
  padding:30px;
  border-radius:28px;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);

  text-align:center;
  color:white;

  animation: float 4s ease-in-out infinite;
}

/* card nổi nhẹ */
@keyframes float{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0px)}
}

/* TITLE */
h2{
  font-size:18px;
  font-weight:600;
  margin-bottom:20px;
  letter-spacing:0.5px;
}

/* IG BUTTON */
.ig{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;

  padding:15px;
  border-radius:20px;

  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);

  transition:0.25s;
  cursor:pointer;
}

.ig:hover{
  transform:scale(1.05);
  background: rgba(255,255,255,0.25);
}

.ig img{
  width:40px;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
}

.ig a{
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* glow viền nhẹ */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:28px;
  padding:1px;
  background: linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}
</style>
</head>

<body>

<!-- NHẠC -->
<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/khoab7859-code/Quanganh/main/2AM%20Hoodtrap.mp3" type="audio/mpeg">
</audio>

<div class="card">

  <h2>Tất cả mxh của Quang Anh ở đây👇</h2>

  <div class="ig">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    <a href="https://www.instagram.com/_quag4ahn" target="_blank">Instagram</a>
  </div>

</div>

<script>
// click bất kỳ đâu = phát nhạc
document.addEventListener("click", () => {
  document.getElementById("bgmusic").play();
}, { once:true });
</script>

</body>
</html>
