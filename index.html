<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Anh</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#00bfff,#1e90ff,#4169e1);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* mưa */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.card{
  position:relative;
  z-index:1;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:90%;
  max-width:600px;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{
  font-size:16px;
  margin:10px 0;
}

.creator{
  margin-top:15px;
  opacity:0.8;
}

/* IG box */
.ig-box{
  margin-top:20px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.ig-box img{
  width:40px;
  height:40px;
}

.ig-box a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* nút */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:white;
  color:#1e90ff;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- NHẠC -->
<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/khoab7859-code/Quanganh/main/2AM%20Hoodtrap.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>Quang Anh</h1>
  <p>Chào mừng đến với website chính thức</p>
  <p>💙 Cảm ơn bạn đã ghé thăm</p>

  <a class="btn" href="#">Khám phá</a>

  <!-- IG -->
  <div class="ig-box">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    <a href="https://www.instagram.com/_quag4ahn" target="_blank">
      Instagram của tôi
    </a>
  </div>

  <p class="creator">Được tạo bởi Quang Anh</p>
</div>

<script>
// CLICK LÀ PHÁT NHẠC
document.addEventListener("click", () => {
  document.getElementById("bgmusic").play();
}, { once:true });

// MƯA
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for(let i=0;i<100;i++){
  drops.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    l: Math.random()*20+10,
    s: Math.random()*5+2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="rgba(255,255,255,0.6)";
  for(let d of drops){
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x,d.y+d.l);
    ctx.stroke();

    d.y += d.s;
    if(d.y>canvas.height){
      d.y=-20;
      d.x=Math.random()*canvas.width;
    }
  }
  requestAnimationFrame(draw);
}
draw();

window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
