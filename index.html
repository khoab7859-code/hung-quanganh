<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Anh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#00bfff,#1e90ff,#4169e1);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌧️ mưa */
#rain{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

/* card */
.card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:90%;
    max-width:600px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

/* 📱 MENU */
.menu{
    position:fixed;
    top:15px;
    right:15px;
    z-index:3;
}

.menu-btn{
    background:#ffffff20;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    backdrop-filter:blur(10px);
    font-weight:bold;
    text-align:center;
    width:220px;
}

/* dropdown */
.menu-content{
    display:none;
    margin-top:10px;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.menu-content a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 15px;
    text-decoration:none;
    color:#333;
    transition:0.2s;
}

.menu-content a:hover{
    background:#f2f2f2;
}

.menu-content img{
    width:22px;
    height:22px;
}

/* text */
h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    margin:10px 0;
}

.creator{
    margin-top:20px;
    font-size:14px;
    color:#e6f7ff;
}
</style>
</head>

<body>

<!-- 🌧️ mưa -->
<canvas id="rain"></canvas>

<!-- 📱 MENU MXH -->
<div class="menu">
    
    <div class="menu-btn" onclick="toggleMenu()">
        Tất cả các MXH của Quang Anh ở đây 👇
    </div>

    <div class="menu-content" id="menu">

        <a target="_blank"
        href="https://www.instagram.com/_quag4ahn?igsh=MWNoNnZ3ZmhhcHBkdw%3D%3D&utm_source=qr">

            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
            Instagram
        </a>

    </div>
</div>

<div class="card">
    <h1>Quang Anh</h1>

    <p>Chào mừng bạn đến với website ✨</p>
    <p>💙 Cảm ơn bạn đã ghé thăm</p>

    <p class="creator">Được tạo bởi Quang Anh</p>
</div>

<script>
function toggleMenu(){
    let menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

/* 🌧️ mưa */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let drops = [];

for(let i=0;i<130;i++){
    drops.push({
        x: Math.random()*window.innerWidth,
        y: Math.random()*window.innerHeight,
        len: Math.random()*20+10,
        speed: Math.random()*6+2
    });
}

function rain(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="rgba(255,255,255,0.7)";
    ctx.lineWidth=1;

    for(let d of drops){
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x,d.y+d.len);
        ctx.stroke();

        d.y += d.speed;

        if(d.y > canvas.height){
            d.y = -20;
            d.x = Math.random()*window.innerWidth;
        }
    }

    requestAnimationFrame(rain);
}

rain();
</script>

</body>
</html>
