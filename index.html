<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hưng & Quang Anh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#00bfff,#1e90ff,#4169e1);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:90%;
    max-width:600px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    margin:10px 0;
}

.creator{
    margin-top:20px;
    color:#e6f7ff;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:#1e90ff;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}
</style>
</head>

<body>
    <div class="card">
        <h1>Hưng & Quang Anh</h1>

        <p>Chào mừng đến với website chính thức của chúng tôi.</p>

        <p>💙 Cảm ơn bạn đã ghé thăm website.</p>

        <a href="#" class="btn">Khám phá</a>

        <p class="creator">Được tạo bởi Quang Anh</p>
    </div>
</body>
</html>
