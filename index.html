<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Anh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow:hidden;

    background: linear-gradient(135deg,#00bfff,#1e90ff,#4169e1);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌧️ canvas mưa */
#rain{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

/* card */
.card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:90%;
    max-width:600px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    margin:10px 0;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:#1e90ff;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- 🌧️ CANVAS MƯA (BẮT BUỘC PHẢI CÓ) -->
<canvas id="rain"></canvas>

<div class="card">
    <h1>Quang Anh</h1>
    <p>Website có hiệu ứng mưa 🌧️</p>
    <p>💙 Cảm ơn bạn đã ghé thăm</p>
    <a class="btn" href="#">Khám phá</a>
</div>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

let drops = [];

for(let i=0;i<120;i++){
    drops.push({
        x: Math.random()*window.innerWidth,
        y: Math.random()*window.innerHeight,
        len: Math.random()*20+10,
        speed: Math.random()*6+2
    });
}

function rain(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="rgba(255,255,255,0.7)";
    ctx.lineWidth=1;

    for(let d of drops){
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x,d.y+d.len);
        ctx.stroke();

        d.y += d.speed;

        if(d.y > canvas.height){
            d.y = -20;
            d.x = Math.random()*canvas.width;
        }
    }

    requestAnimationFrame(rain);
}

rain();
</script>

</body>
</html>
