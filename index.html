<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Anh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#00bfff,#1e90ff,#4169e1);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:90%;
    max-width:600px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    margin:10px 0;
}

.creator{
    margin-top:20px;
    color:#e6f7ff;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:#1e90ff;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}
</style>
</head>

<body>
    <div class="card">
        <h1>Quang Anh</h1>

        <p>Chào mừng đến với website chính thức của chúng tôi.</p>

        <p>💙 Cảm ơn bạn đã ghé thăm website.</p>

        <a href="#" class="btn">Khám phá</a>

        <p class="creator">Được tạo bởi Quang Anh</p>
    </div>
<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let raindrops = [];

for (let i = 0; i < 100; i++) {
  raindrops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    length: Math.random() * 20 + 10,
    speed: Math.random() * 5 + 2
  });
}

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(255,255,255,0.6)";
  ctx.lineWidth = 1;

  for (let i = 0; i < raindrops.length; i++) {
    let r = raindrops[i];

    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x, r.y + r.length);
    ctx.stroke();

    r.y += r.speed;

    if (r.y > canvas.height) {
      r.y = -20;
      r.x = Math.random() * canvas.width;
    }
  }

  requestAnimationFrame(drawRain);
}

drawRain();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script></body>
</html>
